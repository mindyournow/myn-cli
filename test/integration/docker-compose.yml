services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mind-your-now-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  myn-backend:
    build:
      context: ${MYN_BACKEND_PATH:-.}
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mind-your-now-test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: testpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 1
      JWT_SECRET: ${MYN_TEST_JWT_SECRET:?MYN_TEST_JWT_SECRET must be set}
      DEMO_API_KEY: ${MYN_TEST_DEMO_KEY:?MYN_TEST_DEMO_KEY must be set}
    ports:
      - "17000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/actuator/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s
