version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mynow
    main: ./cmd/mynow
    binary: mynow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

nfpms:
  - id: packages
    package_name: mynow
    vendor: Mind Your Now
    homepage: https://github.com/mindyournow/myn-cli
    maintainer: Mind Your Now <support@mindyournow.com>
    description: Fast, scriptable Linux terminal client for Mind Your Now
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/mynow/LICENSE
    scripts:
      postinstall: ""

release:
  github:
    owner: mindyournow
    name: myn-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999
